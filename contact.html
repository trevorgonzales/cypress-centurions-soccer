<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Contact Cypress Centurion Boys Soccer."
    >
    <title>Contact | Cypress High Soccer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="contact-config.js" defer></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html#home" aria-label="Cypress Centurion Boys Soccer home">
          <img
            class="brand-logo"
            src="https://assets.chsboyssoccer.com/Cypress_High_School_40th_Anniversary_Logo.png"
            alt="Cypress High School logo"
          >
          <span class="brand-copy">
            <span class="brand-title">Cypress Centurion</span>
            <span class="brand-subtitle">Boys Soccer</span>
          </span>
        </a>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Open navigation menu"
          aria-controls="primary-navigation"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav id="primary-navigation" class="main-nav" aria-label="Primary navigation">
          <a href="index.html#home">Home</a>
          <a href="meet-our-team.html">Team</a>
          <a href="schedule.html">Schedule</a>
          <a href="forms.html">Forms</a>
          <a class="active" href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main id="main-content" class="contact-page">
      <section class="contact-section" aria-labelledby="contact-title">
        <div class="contact-heading">
          <h1 id="contact-title">Contact</h1>
          <p>Send a message to Cypress Boys Soccer</p>
        </div>

        <form class="contact-form" data-contact-form novalidate>
          <div class="form-field">
            <label for="contact-name">Name</label>
            <input
              id="contact-name"
              name="name"
              type="text"
              autocomplete="name"
              required
              minlength="3"
              pattern="[A-Za-z ]{3,}"
              aria-describedby="contact-name-error"
            >
            <p class="field-error" id="contact-name-error" data-error-for="name"></p>
          </div>

          <div class="form-field">
            <label for="contact-email">Email</label>
            <input
              id="contact-email"
              name="email"
              type="email"
              autocomplete="email"
              required
              aria-describedby="contact-email-error"
            >
            <p class="field-error" id="contact-email-error" data-error-for="email"></p>
          </div>

          <div class="form-field">
            <label for="contact-phone">Phone</label>
            <input
              id="contact-phone"
              name="phone"
              type="tel"
              autocomplete="tel"
              inputmode="numeric"
              required
              aria-describedby="contact-phone-error"
            >
            <p class="field-error" id="contact-phone-error" data-error-for="phone"></p>
          </div>

          <div class="form-field">
            <label for="contact-message">Message</label>
            <textarea
              id="contact-message"
              name="message"
              required
              minlength="3"
              rows="6"
              aria-describedby="contact-message-error"
            ></textarea>
            <p class="field-error" id="contact-message-error" data-error-for="message"></p>
          </div>

          <div class="captcha-field">
            <div id="contact-turnstile" data-turnstile-container></div>
            <p class="field-error" data-error-for="captcha"></p>
          </div>

          <p class="contact-status" data-contact-status role="status" aria-live="polite"></p>

          <button class="contact-submit" type="submit">Send Message</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="social-links" aria-label="Social links">
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.3" cy="6.7" r="1"></circle>
          </svg>
        </a>
        <a href="#" aria-label="Facebook">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 8h2V4h-3c-3 0-5 2-5 5v2H6v4h2v5h4v-5h3l1-4h-4V9c0-.6.4-1 2-1Z"></path>
          </svg>
        </a>
      </div>
      <p>Copyright 2025</p>
    </footer>
  </body>
</html>
