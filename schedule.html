<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Cypress Centurion Boys Soccer season schedule and upcoming games."
    >
    <title>Schedule | Cypress High Soccer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="schedule-config.js" defer></script>
    <script src="script.js" defer></script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html#home" aria-label="Cypress Centurion Boys Soccer home">
          <img
            class="brand-logo"
            src="https://assets.chsboyssoccer.com/Cypress_High_School_40th_Anniversary_Logo.png"
            alt="Cypress High School logo"
          >
          <span class="brand-copy">
            <span class="brand-title">Cypress Centurion</span>
            <span class="brand-subtitle">Boys Soccer</span>
          </span>
        </a>

        <button
          class="menu-toggle"
          type="button"
          aria-label="Open navigation menu"
          aria-controls="primary-navigation"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav id="primary-navigation" class="main-nav" aria-label="Primary navigation">
          <a href="index.html#home">Home</a>
          <a href="meet-our-team.html">Team</a>
          <a class="active" href="schedule.html">Schedule</a>
          <a href="forms.html">Forms</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main id="main-content" class="schedule-page">
      <section class="schedule-page-section" aria-labelledby="schedule-title">
        <div class="schedule-heading">
          <h1 id="schedule-title">Schedule</h1>
          <p>Season calendar and upcoming games</p>
        </div>

        <div class="schedule-layout">
          <section class="upcoming-panel" aria-labelledby="upcoming-title">
            <h2 id="upcoming-title">Upcoming Games</h2>
            <div class="game-list" data-schedule-list></div>
          </section>

          <section class="calendar-panel" aria-labelledby="calendar-title" data-calendar-panel>
            <h2 id="calendar-title">Calendar</h2>
            <div class="calendar-shell">
              <iframe
                class="calendar-frame"
                data-calendar-frame
                title="Cypress Centurion Boys Soccer Google Calendar"
                loading="lazy"
                hidden
              ></iframe>
              <div class="calendar-empty" data-calendar-empty>
                <p>Schedule coming soon</p>
              </div>
              <div class="team-calendar" data-team-calendar hidden></div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="social-links" aria-label="Social links">
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.3" cy="6.7" r="1"></circle>
          </svg>
        </a>
        <a href="#" aria-label="Facebook">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 8h2V4h-3c-3 0-5 2-5 5v2H6v4h2v5h4v-5h3l1-4h-4V9c0-.6.4-1 2-1Z"></path>
          </svg>
        </a>
      </div>
      <p>Copyright 2025</p>
    </footer>
  </body>
</html>
